LogLevel warn
MaxLogSize 1m
ErrorPolicy retry-job
JobRetryInterval 30
JobRetryLimit 20

Listen 0.0.0.0:631
Listen /run/cups/cups.sock

Browsing Yes
BrowseLocalProtocols dnssd

DefaultAuthType Basic
WebInterface Yes

ServerAlias *
DefaultEncryption Never
DefaultPaperSize A4
ReadyPaperSizes A4,TA4,4X6FULL,T4X6FULL,2L,T2L,A6,A5,B5,L,TL,INDEX5,8x10,T8x10,4X7,T4X7,Postcard,TPostcard,ENV10,EnvDL,ENVC6,Letter,Legal
pdftops-renderer ghostscript

# All hosts can access the printer without authentication
<Location />
  AuthType None
  Allow All
  Order allow,deny
</Location>

# Admin requires authentication
<Location /admin>
  AuthType Basic
  Allow All
  Require user @SYSTEM
  Order allow,deny
</Location>

<Location /admin/conf>
  AuthType Basic
  Allow All
  Require user @SYSTEM
  Order allow,deny
</Location>

<Location /admin/log>
  AuthType Basic
  Require user @SYSTEM
  Order allow,deny
</Location>

<Policy default>
  JobPrivateAccess default
  JobPrivateValues default
  SubscriptionPrivateAccess default
  SubscriptionPrivateValues default

  # Print job creation and submission - no auth required
  <Limit Create-Job Print-Job Print-URI Validate-Job>
    Order deny,allow
  </Limit>

  <Limit Send-Document Send-URI Hold-Job Release-Job Restart-Job Purge-Jobs Set-Job-Attributes Create-Job-Subscription Renew-Subscription Cancel-Subscription Get-Notifications Reprocess-Job Cancel-Current-Job Suspend-Current-Job Resume-Job Cancel-My-Jobs Close-Job CUPS-Move-Job>
    Order deny,allow
  </Limit>

  <Limit CUPS-Get-Document>
    Order deny,allow
  </Limit>

  # Printer and class administration requires a system user
  <Limit CUPS-Add-Modify-Printer CUPS-Delete-Printer CUPS-Add-Modify-Class CUPS-Delete-Class CUPS-Set-Default CUPS-Get-Devices>
    AuthType Default
    Require user @SYSTEM
    Order deny,allow
  </Limit>

  # Printer operator actions require a system user
  <Limit Pause-Printer Resume-Printer Enable-Printer Disable-Printer Pause-Printer-After-Current-Job Hold-New-Jobs Release-Held-New-Jobs Deactivate-Printer Activate-Printer Restart-Printer Shutdown-Printer Startup-Printer Promote-Job Schedule-Job-After Cancel-Jobs CUPS-Accept-Jobs CUPS-Reject-Jobs>
    AuthType Default
    Require user @SYSTEM
    Order deny,allow
  </Limit>

  <Limit Cancel-Job>
    Order deny,allow
  </Limit>

  <Limit CUPS-Authenticate-Job>
    AuthType Default
    Require user @OWNER @SYSTEM
    Order deny,allow
  </Limit>

  <Limit All>
    Order deny,allow
  </Limit>
</Policy>
